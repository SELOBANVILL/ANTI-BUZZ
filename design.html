<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anti-Buzz — System Design</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <div id="preloader" aria-hidden="true"><div class="sweep"></div></div>

    <div id="transition" aria-hidden="true">
      <div class="label">System Design</div>
    </div>

    <svg width="0" height="0" style="position: absolute">
      <filter id="grainFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch" />
        <feColorMatrix type="matrix" values="
          0.90 0 0 0 0
          0 0.25 0 0 0
          0 0 0.25 0 0
          0 0 0 1 0" />
      </filter>
    </svg>
    <div id="grain-layer" aria-hidden="true"></div>

    <header class="nav">
      <div class="container nav-inner">
        <a class="logo" href="index.html" data-cursor="hover">
          <span>Anti-Buzz</span><span class="dot">•</span>
        </a>
        <nav class="nav-links" aria-label="Primary">
          <a href="index.html" data-nav data-cursor="hover">Home</a>
          <a href="overview.html" data-nav data-cursor="hover">Overview</a>
          <a href="materials.html" data-nav data-cursor="hover">Materials</a>
          <a href="design.html" data-nav data-cursor="hover">System Design</a>
        </nav>
      </div>
    </header>

    <div data-barba="wrapper">
      <main
        class="page"
        data-barba="container"
        data-barba-namespace="design"
        data-page-name="System Design"
      >
        <header class="container page-header">
          <h1 class="page-title display">
            <span class="wipe" data-wipe data-page-title>System Design</span>
          </h1>
        </header>

        <section class="container section" data-fade-up>
          <div style="color: var(--red-bright); letter-spacing: .14em; text-transform: uppercase; font-size: 12px">
            Exterior Sketch
          </div>
          <div class="placeholder-row" style="margin-top: 14px">
            <figure class="placeholder pulse has-image" data-cursor="hover" style="margin:0">
              <img src="assets/exterior-sketch.png" alt="Exterior sketch of the Anti-Buzz housing and bell mechanism." />
            </figure>
          </div>
        </section>

        <section class="container section" data-fade-up>
          <div style="color: var(--red-bright); letter-spacing: .14em; text-transform: uppercase; font-size: 12px">
            Interior Sketch
          </div>
          <div class="placeholder-row" style="margin-top: 14px">
            <figure class="placeholder pulse has-image" data-cursor="hover" style="margin:0">
              <img src="assets/interior-sketch.png" alt="Interior sketch showing the components inside the Anti-Buzz housing." />
            </figure>
          </div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
    <script src="transitions.js"></script>
  </body>
</html>
